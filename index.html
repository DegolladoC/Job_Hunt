<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobQuest — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ===================== RESET & BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --border:    rgba(255,255,255,0.07);
      --teal:      #00d4c8;
      --teal-dim:  rgba(0,212,200,0.15);
      --orange:    #ff6b35;
      --orange-dim:rgba(255,107,53,0.15);
      --blue:      #4a9eff;
      --blue-dim:  rgba(74,158,255,0.15);
      --green:     #3ddc97;
      --green-dim: rgba(61,220,151,0.12);
      --text:      #e6edf3;
      --muted:     #7d8590;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===================== HEADER ===================== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
      color: var(--teal);
    }
    .logo span { color: var(--text); }

    /* Period Selector */
    .period-tabs {
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
    }
    .period-tab {
      padding: 6px 18px; border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      font-family: var(--font-head); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .period-tab.active {
      background: var(--teal); color: #0d1117;
    }
    .period-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

    .header-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem; color: var(--muted);
      text-align: right; line-height: 1.5;
    }

    /* ===================== LAYOUT ===================== */
    main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

    .section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--teal);
      margin-bottom: 1rem; margin-top: 2.5rem;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
    .grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }

    /* ===================== CARDS ===================== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.14); }

    .card-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ===================== STAT CARDS ===================== */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.teal::before { background: var(--teal); }
    .stat-card.orange::before { background: var(--orange); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.green::before { background: var(--green); }

    .stat-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: var(--font-mono); font-size: 2.2rem;
      font-weight: 700; line-height: 1; margin-bottom: 0.3rem;
    }
    .stat-card.teal .stat-value { color: var(--teal); }
    .stat-card.orange .stat-value { color: var(--orange); }
    .stat-card.blue .stat-value { color: var(--blue); }
    .stat-card.green .stat-value { color: var(--green); }

    .stat-sub { font-size: 0.78rem; color: var(--muted); }

    /* ===================== BADGE ===================== */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .badge-teal { background: var(--teal-dim); color: var(--teal); }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-blue { background: var(--blue-dim); color: var(--blue); }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-muted { background: rgba(125,133,144,0.15); color: var(--muted); }

    /* ===================== TABLES ===================== */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      padding: 0.5rem 0.75rem; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 0.65rem 0.75rem; font-size: 0.82rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ===================== EFFICIENCY BAR ===================== */
    .eff-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
    .eff-row:last-child { margin-bottom: 0; }
    .eff-header { display: flex; justify-content: space-between; align-items: center; }
    .eff-name { font-size: 0.82rem; font-weight: 600; }
    .eff-stats { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); }
    .eff-bar-bg {
      height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
    }
    .eff-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    /* ===================== DONUT ===================== */
    .donut-wrap {
      display: flex; align-items: center; gap: 1.5rem;
    }
    .donut-canvas { width: 130px !important; height: 130px !important; flex-shrink: 0; }
    .donut-legend { flex: 1; }
    .donut-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 0.5rem; font-size: 0.82rem;
    }
    .donut-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .donut-item-label { flex: 1; color: var(--muted); }
    .donut-item-val { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700; }

    /* ===================== INTERVIEW CARDS ===================== */
    .interview-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .interview-item {
      background: var(--surface2); border-radius: 8px;
      padding: 0.75rem 1rem;
      border-left: 3px solid var(--teal);
      display: grid; grid-template-columns: 1fr auto;
      gap: 0.25rem 1rem; align-items: center;
    }
    .interview-company { font-weight: 700; font-size: 0.9rem; }
    .interview-puesto { font-size: 0.78rem; color: var(--muted); }
    .interview-date { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); text-align: right; }
    .interview-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

    /* ===================== SALARY TABLE ===================== */
    .salary-row {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 0.5rem; align-items: center;
      padding: 0.65rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .salary-row:last-child { border-bottom: none; }
    .salary-cat { font-weight: 600; }
    .salary-num { font-family: var(--font-mono); font-size: 0.75rem; text-align: right; }
    .salary-avg { color: var(--teal); }
    .salary-max { color: var(--orange); }
    .salary-min { color: var(--muted); }

    /* ===================== REPEATED COMPANIES ===================== */
    .company-repeat {
      background: var(--surface2); border-radius: 10px;
      padding: 1rem; margin-bottom: 0.75rem;
    }
    .company-repeat:last-child { margin-bottom: 0; }
    .company-repeat-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .company-repeat-name { font-weight: 700; font-size: 0.95rem; }
    .repeat-detail {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-top: 0.5rem;
    }
    .repeat-detail-item {
      background: rgba(255,255,255,0.03); border-radius: 6px;
      padding: 0.5rem 0.75rem; font-size: 0.75rem;
    }
    .repeat-detail-label { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

    /* ===================== MODAL ===================== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem;
      max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
      transform: translateY(12px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; line-height: 1;
      padding: 4px; border-radius: 4px;
    }
    .modal-close:hover { color: var(--text); background: var(--surface2); }

    /* ===================== EMPTY STATE ===================== */
    .empty {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--muted); font-size: 0.85rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }

    /* ===================== CHART CONTAINER ===================== */
    .chart-wrap { position: relative; width: 100%; }

    /* ===================== SCROLLABLE ===================== */
    .scrollable { overflow-y: auto; max-height: 320px; }
    .scrollable::-webkit-scrollbar { width: 4px; }
    .scrollable::-webkit-scrollbar-track { background: transparent; }
    .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===================== LOADING ===================== */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 300;
      gap: 1rem;
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--surface2);
      border-top-color: var(--teal);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.8rem; color: var(--muted); font-family: var(--font-mono); }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .grid-4, .grid-3, .grid-2, .grid-2-1, .grid-1-2 { grid-template-columns: 1fr; }
      header { padding: 0 1rem; }
      main { padding: 1rem; }
      .period-tabs { gap: 2px; }
      .period-tab { padding: 5px 12px; font-size: 0.75rem; }
    }

    /* ===================== ANIMATIONS ===================== */
    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card, .stat-card { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Cargando datos...</div>
</div>

<header>
  <div class="logo">Job<span>Quest</span></div>
  <div class="period-tabs">
    <button class="period-tab active" data-period="weekly">Semanal</button>
    <button class="period-tab" data-period="monthly">Mensual</button>
    <button class="period-tab" data-period="history">Historial</button>
  </div>
  <div class="header-meta" id="header-meta">—</div>
</header>

<main id="app"></main>

<!-- Modal para detalle de empresa repetida -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Detalle</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const DATA_BASE = './data/';
const FILES = { weekly: 'weekly.json', monthly: 'monthly.json', history: 'history.json' };

const NIVEL_COLOR = {
  'Entrevista': 'teal', 'Llamada': 'blue',
  'Segundo Contacto': 'orange', 'Primer Contacto': 'green'
};

let currentData = null;
let charts = {};

// ===================== FETCH =====================
async function loadData(period) {
  const res = await fetch(DATA_BASE + FILES[period]);
  if (!res.ok) throw new Error('No se pudo cargar el archivo de datos.');
  return res.json();
}

// ===================== CHART HELPERS =====================
Chart.defaults.color = '#7d8590';
Chart.defaults.borderColor = 'rgba(255,255,255,0.07)';
Chart.defaults.font.family = "'Syne', sans-serif";

function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

function makeDonut(id, labels, values, colors) {
  const ctx = document.getElementById(id);
  if (!ctx) return null;
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      cutout: '72%', plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: (c) => ` ${c.label}: ${c.raw}` }
      }},
      animation: { animateRotate: true, duration: 700 }
    }
  });
}

function makeBar(id, labels, datasets, opts = {}) {
  const ctx = document.getElementById(id);
  if (!ctx) return null;
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: opts.legend ?? false }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font: { size: 10 } }, beginAtZero: true, ...opts.yAxis }
      },
      ...opts.extra
    }
  });
}

// ===================== RENDER HELPERS =====================
function badge(text, color) {
  return `<span class="badge badge-${color}">${text}</span>`;
}

function emptyState(msg = 'Sin datos disponibles') {
  return `<div class="empty"><div class="empty-icon">◌</div>${msg}</div>`;
}

function efficiencyBar(name, posts, resp, effStr, color = 'teal') {
  const pct = parseFloat(effStr) || 0;
  return `
    <div class="eff-row">
      <div class="eff-header">
        <span class="eff-name">${name}</span>
        <span class="eff-stats">${resp}/${posts} · <strong style="color:var(--${color})">${effStr}</strong></span>
      </div>
      <div class="eff-bar-bg"><div class="eff-bar-fill" style="width:${pct}%; background: linear-gradient(90deg, var(--${color}), var(--blue))"></div></div>
    </div>`;
}

// ===================== SECTIONS =====================

function renderResumen(d) {
  const r = d.resumen;
  const hasEntrevistas = r.entrevistas_conseguidas?.length > 0;

  return `
    <div class="section-label">Resumen General</div>
    <div class="grid-4" style="margin-bottom:1rem">
      <div class="stat-card teal">
        <div class="stat-label">Total Postulaciones</div>
        <div class="stat-value">${r.total_postulaciones}</div>
        <div class="stat-sub">${d.meta.periodo}</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">Respuestas</div>
        <div class="stat-value">${r.total_respuestas}</div>
        <div class="stat-sub">de ${r.total_postulaciones} postulaciones</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Tasa de Respuesta</div>
        <div class="stat-value">${r.tasa_respuesta}</div>
        <div class="stat-sub">eficiencia general</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Entrevistas</div>
        <div class="stat-value">${r.entrevistas_conseguidas?.length ?? 0}</div>
        <div class="stat-sub">conseguidas en el periodo</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Puesto con Mayor Respuesta</div>
        ${r.puesto_mayor_respuesta?.length
          ? r.puesto_mayor_respuesta.map(p => `<span style="font-weight:700;font-size:1rem;">${p}</span>`).join('<br>')
          : emptyState()}
      </div>
      <div class="card">
        <div class="card-title">CV con Mayor Respuesta</div>
        ${r.cv_mayor_respuesta?.length
          ? r.cv_mayor_respuesta.map(c => `<span style="font-weight:700;font-size:1rem;color:var(--teal)">${c}</span>`).join('<br>')
          : emptyState()}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Entrevistas Conseguidas</div>
      ${hasEntrevistas ? `
        <div class="interview-list">
          ${r.entrevistas_conseguidas.map(e => `
            <div class="interview-item">
              <div>
                <div class="interview-company">${e.empresa}</div>
                <div class="interview-puesto">${e.puesto}</div>
                <div class="interview-chips">
                  ${badge(e.cv, 'teal')}
                  ${badge(e.modalidad, 'blue')}
                  ${badge('$'+e.salario?.toLocaleString('es-MX'), 'orange')}
                </div>
              </div>
              <div class="interview-date">${new Date(e.fecha_postulacion).toLocaleDateString('es-MX',{year:'numeric',month:'short',day:'numeric'})}</div>
            </div>`).join('')}
        </div>` : emptyState('Aún no hay entrevistas en este periodo')}
    </div>`;
}

function renderSeguimientos(d) {
  const s = d.seguimientos;
  const lista = s?.empresas_contactaron ?? [];
  return `
    <div class="section-label">Seguimientos</div>
    <div class="card">
      <div class="card-title">Empresas que me Contactaron</div>
      ${lista.length ? `
        <table class="data-table">
          <thead><tr>
            <th>Empresa</th><th>Puesto</th><th>Nivel</th><th>CV</th><th>Fecha</th>
          </tr></thead>
          <tbody>
            ${lista.map(e => `<tr>
              <td><strong>${e.empresa}</strong></td>
              <td>${e.puesto}</td>
              <td>${badge(e.nivel_contacto, NIVEL_COLOR[e.nivel_contacto] ?? 'muted')}</td>
              <td><span style="font-family:var(--font-mono);font-size:0.75rem;color:var(--teal)">${e.cv_enviado}</span></td>
              <td style="font-family:var(--font-mono);font-size:0.72rem;color:var(--muted)">${new Date(e.fecha_postulacion).toLocaleDateString('es-MX',{year:'numeric',month:'short',day:'numeric'})}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : emptyState('Sin contactos registrados')}
    </div>`;
}

function renderPostulaciones(d) {
  const p = d.postulaciones;
  const total = (p.estados.Postulado||0) + (p.estados.Retirado||0) + (p.estados.Entrevistado||0);
  const diasLabels = Object.keys(p.por_dia);
  const diasVals   = Object.values(p.por_dia);

  setTimeout(() => {
    charts.donut = makeDonut('donut-estados',
      ['Postulado', 'Retirado', 'Entrevistado'],
      [p.estados.Postulado, p.estados.Retirado, p.estados.Entrevistado],
      ['#4a9eff', '#ff6b35', '#00d4c8']
    );
    charts.barDias = makeBar('bar-dias', diasLabels, [{
      label: 'Postulaciones',
      data: diasVals,
      backgroundColor: 'rgba(0,212,200,0.6)',
      borderColor: 'var(--teal)',
      borderWidth: 1,
      borderRadius: 4
    }], { extra: {} });
  }, 100);

  return `
    <div class="section-label">Postulaciones</div>
    <div class="grid-2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Estado de Postulaciones</div>
        <div class="donut-wrap">
          <canvas id="donut-estados" class="donut-canvas"></canvas>
          <div class="donut-legend">
            ${[['Postulado','blue'],['Retirado','orange'],['Entrevistado','teal']].map(([k,c]) => `
              <div class="donut-item">
                <div class="donut-dot" style="background:var(--${c})"></div>
                <span class="donut-item-label">${k}</span>
                <span class="donut-item-val" style="color:var(--${c})">${p.estados[k]}</span>
              </div>`).join('')}
            <div style="margin-top:0.75rem;font-size:0.72rem;color:var(--muted)">Total: ${total}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Postulaciones por Día de la Semana</div>
        <div class="chart-wrap" style="height:160px">
          <canvas id="bar-dias"></canvas>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Detalle de Entrevistas</div>
      ${p.entrevistados?.length ? `
        <table class="data-table">
          <thead><tr>
            <th>Empresa</th><th>Puesto</th><th>Salario</th><th>Modalidad</th><th>CV</th>
          </tr></thead>
          <tbody>
            ${p.entrevistados.map(e => `<tr>
              <td><strong>${e.empresa}</strong></td>
              <td>${e.puesto}</td>
              <td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--orange)">$${e.salario?.toLocaleString('es-MX')}</td>
              <td>${badge(e.modalidad, 'blue')}</td>
              <td><span style="font-family:var(--font-mono);font-size:0.75rem;color:var(--teal)">${e.cv}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>` : emptyState('Sin entrevistas en este periodo')}
    </div>`;
}

function renderEficiencias(d) {
  const e = d.eficiencias;

  return `
    <div class="section-label">Eficiencias</div>
    <div class="grid-2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Por Plataforma</div>
        ${e.por_plataforma?.length
          ? e.por_plataforma.map(p => efficiencyBar(p.aplicacion, p.postulaciones, p.respuestas, p.eficiencia, 'teal')).join('')
          : emptyState()}
      </div>
      <div class="card">
        <div class="card-title">Por CV</div>
        ${e.por_cv?.length
          ? e.por_cv.map(c => efficiencyBar(c.cv, c.postulaciones, c.respuestas, c.eficiencia, 'orange')).join('')
          : emptyState()}
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Por Categoría de Puesto</div>
        ${e.por_puesto?.length
          ? e.por_puesto.map(p => efficiencyBar(p.categoria, p.postulaciones, p.respuestas, p.eficiencia, 'blue')).join('')
          : emptyState()}
      </div>
      <div class="card">
        <div class="card-title">Por Rango Salarial</div>
        ${e.por_salario?.length
          ? e.por_salario.map(s => efficiencyBar(s.rango, s.postulaciones, s.respuestas, s.eficiencia, 'green')).join('')
          : emptyState()}
      </div>
    </div>`;
}

function renderAnalisis(d) {
  const a = d.analisis;
  const repetidas = a.empresas_repetidas ?? [];
  const mod = a.modalidades ?? {};
  const totalMod = (mod.Presencial||0) + (mod.Hibrido||0) + (mod.Remoto||0);

  setTimeout(() => {
    charts.donutMod = makeDonut('donut-modalidad',
      ['Presencial', 'Híbrido', 'Remoto'],
      [mod.Presencial||0, mod.Hibrido||0, mod.Remoto||0],
      ['#ff6b35', '#4a9eff', '#00d4c8']
    );
  }, 100);

  return `
    <div class="section-label">Análisis</div>
    <div class="grid-2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Salario por Categoría de Puesto</div>
        ${a.salario_por_puesto?.length ? `
          <div style="font-size:0.65rem;display:grid;grid-template-columns:1fr auto auto auto;gap:0.5rem;padding:0 0 0.5rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">
            <span></span><span>PROM</span><span>MÁX</span><span>MÍN</span>
          </div>
          ${a.salario_por_puesto.map(s => `
            <div class="salary-row">
              <span class="salary-cat">${s.categoria}</span>
              <span class="salary-num salary-avg">$${s.promedio?.toLocaleString('es-MX')}</span>
              <span class="salary-num salary-max">$${s.maximo?.toLocaleString('es-MX')}</span>
              <span class="salary-num salary-min">$${s.minimo?.toLocaleString('es-MX')}</span>
            </div>`).join('')}` : emptyState()}
      </div>
      <div class="card">
        <div class="card-title">Salario por CV</div>
        ${a.salario_por_cv?.length ? `
          <div style="font-size:0.65rem;display:grid;grid-template-columns:1fr auto auto auto;gap:0.5rem;padding:0 0 0.5rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">
            <span></span><span>PROM</span><span>MÁX</span><span>MÍN</span>
          </div>
          ${a.salario_por_cv.map(s => `
            <div class="salary-row">
              <span class="salary-cat" style="color:var(--teal)">${s.cv}</span>
              <span class="salary-num salary-avg">$${s.promedio?.toLocaleString('es-MX')}</span>
              <span class="salary-num salary-max">$${s.maximo?.toLocaleString('es-MX')}</span>
              <span class="salary-num salary-min">$${s.minimo?.toLocaleString('es-MX')}</span>
            </div>`).join('')}` : emptyState()}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Empresas Repetidas</div>
        ${repetidas.length ? `
          <div class="scrollable">
          ${repetidas.map(emp => `
            <div class="company-repeat">
              <div class="company-repeat-header">
                <span class="company-repeat-name">${emp.empresa}</span>
                <div style="display:flex;gap:6px;align-items:center">
                  ${badge(emp.veces_postulado + ' veces', 'orange')}
                  <button
                    style="background:var(--teal-dim);color:var(--teal);border:none;border-radius:6px;padding:4px 10px;font-size:0.72rem;cursor:pointer;font-family:var(--font-head);font-weight:700"
                    onclick='openModal(${JSON.stringify(emp).replace(/'/g, "&#39;")})'
                  >Ver detalle</button>
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${emp.aplicaciones_usadas?.map(a => badge(a,'blue')).join('') || ''}
                ${emp.estados?.map(e => badge(e, e==='Entrevistado'?'teal':e==='Retirado'?'orange':'muted')).join('') || ''}
              </div>
            </div>`).join('')}
          </div>` : emptyState('Sin empresas repetidas en este periodo')}
      </div>

      <div class="card">
        <div class="card-title">Distribución de Modalidades</div>
        <div class="donut-wrap">
          <canvas id="donut-modalidad" class="donut-canvas"></canvas>
          <div class="donut-legend">
            ${[['Presencial','orange'],['Hibrido','blue'],['Remoto','teal']].map(([k,c]) => `
              <div class="donut-item">
                <div class="donut-dot" style="background:var(--${c})"></div>
                <span class="donut-item-label">${k}</span>
                <span class="donut-item-val" style="color:var(--${c})">${mod[k]||0}</span>
              </div>`).join('')}
            <div style="margin-top:0.75rem;font-size:0.72rem;color:var(--muted)">Total: ${totalMod}</div>
          </div>
        </div>
      </div>
    </div>`;
}

// ===================== MODAL =====================
function openModal(emp) {
  document.getElementById('modal-title').textContent = emp.empresa;
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:1rem">
      Postulado <strong style="color:var(--orange)">${emp.veces_postulado} veces</strong> ·
      Plataformas: ${emp.aplicaciones_usadas?.join(', ') || '—'}
    </p>
    ${emp.detalle?.map((item, i) => `
      <div style="background:var(--surface2);border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.5rem;border-left:3px solid ${item.estado==='Entrevistado'?'var(--teal)':item.estado==='Retirado'?'var(--orange)':'var(--muted)'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">
          <strong>${item.puesto}</strong>
          ${badge(item.estado, item.estado==='Entrevistado'?'teal':item.estado==='Retirado'?'orange':'muted')}
        </div>
        <div style="font-size:0.75rem;color:var(--muted);display:flex;gap:0.75rem;flex-wrap:wrap">
          <span>CV: <strong style="color:var(--teal)">${item.cv}</strong></span>
          <span>Plataforma: ${item.aplicacion}</span>
          <span>Fecha: ${item.fecha}</span>
        </div>
      </div>`).join('')}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ===================== MAIN RENDER =====================
function render(data) {
  destroyCharts();
  currentData = data;

  document.getElementById('header-meta').innerHTML =
    `${data.meta.periodo}<br><span style="color:var(--teal)">${data.meta.total_postulaciones} postulaciones</span>`;

  document.getElementById('app').innerHTML =
    renderResumen(data) +
    renderSeguimientos(data) +
    renderPostulaciones(data) +
    renderEficiencias(data) +
    renderAnalisis(data);
}

// ===================== INIT =====================
async function init(period = 'weekly') {
  document.getElementById('loading').style.display = 'flex';
  try {
    const data = await loadData(period);
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="empty" style="margin-top:4rem">
        <div class="empty-icon">⚠</div>
        Error al cargar los datos: ${err.message}
      </div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

document.querySelectorAll('.period-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    init(btn.dataset.period);
  });
});

init('weekly');
</script>
</body>
</html>
